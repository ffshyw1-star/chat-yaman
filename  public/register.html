<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إنشاء حساب | شات اليمن المطور</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="overlay">

<div class="login-box">

<h1>📝 إنشاء حساب جديد</h1>

<p>

أنشئ حسابك واستمتع بجميع مميزات شات اليمن المطور.

</p>

<form id="registerForm">

<div class="input-group">

<label>الاسم الظاهر</label>

<input
type="text"
id="fullname"
maxlength="20"
required>

</div>

<div class="input-group">

<label>اسم المستخدم</label>

<input
type="text"
id="username"
maxlength="20"
required>

</div>

<div class="input-group">

<label>البريد الإلكتروني</label>

<input
type="email"
id="email"
required>

</div>

<div class="input-group">

<label>الجنس</label>

<select id="gender">

<option value="">اختر الجنس</option>

<option>👨 ذكر</option>

<option>👩 أنثى</option>

</select>

</div>

<div class="input-group">

<label>العمر</label>

<select id="age"></select>

</div>

<div class="input-group">

<label>كلمة المرور</label>

<input
type="password"
id="password"
required>

</div>

<div class="input-group">

<label>تأكيد كلمة المرور</label>

<input
type="password"
id="confirm"
required>

</div>

<button type="submit">

إنشاء الحساب

</button>

<div id="message"></div>

</form>

<br>

<a href="login.html">

لديك حساب بالفعل؟ تسجيل الدخول

</a>

</div>

</div>

<script>

const age=document.getElementById("age");

for(let i=18;i<=99;i++){

age.innerHTML+=`<option>${i}</option>`;

}

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

const fullname=document.getElementById("fullname").value.trim();

const username=document.getElementById("username").value.trim();

const email=document.getElementById("email").value.trim();

const gender=document.getElementById("gender").value;

const password=document.getElementById("password").value;

const confirm=document.getElementById("confirm").value;

const msg=document.getElementById("message");

if(fullname.length<3){

msg.innerHTML="الاسم قصير جداً";

msg.style.color="red";

return;

}

if(username.length<3){

msg.innerHTML="المرجو إدخال اسم صالح.";

msg.style.color="red";

return;

}

if(password!=confirm){

msg.innerHTML="كلمتا المرور غير متطابقتين.";

msg.style.color="red";

return;

}

msg.style.color="#00ff99";

msg.innerHTML="تم إنشاء الحساب بنجاح.";

setTimeout(()=>{

window.location.href="login.html";

},1500);

});

</script>

</body>

</html>
