<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شات اليمن المطور — غرفة الدردشة</title>
    <!-- تضمين مكتبة Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* كود CSS للتصميم الداكن (Dark Luxury) */
        :root { --bg-dark: #090c15; --bg-card: #121826; --gold: #d4a857; --text: #f1f5f9; }
        body { background: var(--bg-dark); color: var(--text); font-family: sans-serif; }
        .app-header { background: var(--bg-card); padding: 15px; text-align: center; color: var(--gold); }
        .chat-area { height: 70vh; overflow-y: scroll; padding: 20px; }
        .msg-box { padding: 10px; margin-bottom: 10px; border-radius: 10px; }
        .msg-box.me { background: var(--gold); color: #000; text-align: right; }
        .msg-box.other { background: var(--bg-card); }
        .chat-footer { padding: 15px; display: flex; gap: 10px; }
        input, button { padding: 10px; border-radius: 20px; border: none; }
        input { flex: 1; }
        button { background: var(--gold); cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-header"><h1>شات اليمن المطور</h1></div>
    <div class="chat-area" id="chatBox"></div>
    <div class="chat-footer">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك...">
        <button id="sendBtn">إرسال</button>
    </div>
    <script>
        // كود JavaScript لإدارة الشات
        const socket = io();
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const myName = localStorage.getItem("chat_username") || "مستخدم";

        socket.on('msg', (data) => {
            const div = document.createElement('div');
            div.className = `msg-box ${data.user === myName ? 'me' : 'other'}`;
            div.innerHTML = `<b>${data.user}</b>: ${data.text}`;
            chatBox.appendChild(div);
        });

        sendBtn.addEventListener('click', () => {
            socket.emit('message', { text: msgInput.value });
            msgInput.value = '';
        });
    </script>
</body>
</html>
