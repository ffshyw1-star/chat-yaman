<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات اليمن المطور — غرف المحادثة الفاخرة</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        /* CSS الفخم والمظلم المدمج */
        :root { --bg-dark: #070913; --bg-card: #111625; --gold: #d4a857; --text: #f1f5f9; --border: rgba(255, 255, 255, 0.06); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app-header { background: var(--bg-card); padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .app-header h1 { font-size: 18px; color: var(--gold); }
        .exit-btn { background: #e74c3c; color: #fff; padding: 6px 14px; border-radius: 8px; text-decoration: none; font-size: 13px; }
        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        .msg-box { max-width: 75%; padding: 12px 16px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .msg-box.me { align-self: flex-start; background: linear-gradient(135deg, var(--gold), #b78a3c); color: #070913; }
        .msg-box.other { align-self: flex-end; background: var(--bg-card); border: 1px solid var(--border); }
        .msg-box.system { align-self: center; background: rgba(255,255,255,0.04); color: #94a3b8; font-size: 13px; text-align: center; }
        .msg-user { font-size: 12px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .role-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; color: #fff; }
        .msg-media { max-width: 100%; border-radius: 8px; margin-top: 6px; }
        .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; }
        .admin-tools { display: flex; gap: 8px; margin-top: 6px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 6px; }
        .admin-tools button { background: rgba(255,255,255,0.1); border: none; color: #ff7675; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .chat-footer { background: var(--bg-card); padding: 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); }
        .chat-footer input { flex: 1; background: #182035; border: 1px solid var(--border); padding: 14px 20px; border-radius: 30px; color: var(--text); outline: none; }
        .media-btn { background: #182035; color: var(--gold); width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--border); cursor: pointer; }
        .send-btn { background: linear-gradient(135deg, var(--gold), #b78a3c); color: #070913; border: none; padding: 12px 24px; border-radius: 30px; font-weight: 700; cursor: pointer; }
        #fileInput { display: none; }
    </style>
    <script src="https://socket.io"></script>
</head>
<body>
    <div class="app-header">
        <h1 id="roomTitle">👑 شات اليمن المطور</h1>
        <a href="/pages/rooms.html" class="exit-btn">مغادرة 🚪</a>
    </div>
    <div class="chat-area" id="chatBox"></div>
    <div class="chat-footer">
        <button class="media-btn" onclick="document.getElementById('fileInput').click()">📁</button>
        <input type="file" id="fileInput" accept="image/*,audio/*">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." autocomplete="off">
        <button class="send-btn" id="sendBtn">إرسال 🚀</button>
    </div>
    <script>
        const socket = io();
        const chatBox = document.getElementById('chatBox');
        const myName = localStorage.getItem("chat_username") || "زائر";
        const myRoom = localStorage.getItem("current_room") || "العامة";
        const myRole = localStorage.getItem("chat_role") || "زائر";

        document.getElementById('roomTitle').innerText = `👑 ${myRoom} [${myRole}]`;
        socket.emit('join', { name: myName, room: myRoom });

        socket.on('msg', (data) => {
            const div = document.createElement('div');
            if (data.isSystem) {
                div.className = "msg-box system";
                div.innerHTML = `<span>${data.text}</span>`;
            } else {
                const isMe = data.user === myName;
                div.className = `msg-box ${isMe ? 'me' : 'other'}`;
                let adminBtns = (['مالك', 'ادمن'].includes(myRole) && !isMe) ? 
                    `<div class="admin-tools"><button onclick="socket.emit('kickUser', {targetName: '${data.user}'})">طرد</button></div>` : '';
                
                let media = data.fileUrl ? (data.fileType === 'image' ? `<img src="${data.fileUrl}" class="msg-media">` : `<audio src="${data.fileUrl}" controls></audio>`) : '';
                
                div.innerHTML = `
                    <div class="msg-user"><strong>${data.user}</strong></div>
                    <div class="msg-text">${data.text || ''}</div>
                    ${media}
                    ${adminBtns}
                `;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        function sendMsg() {
            const text = document.getElementById('msgInput').value.trim();
            if (text) { socket.emit('message', { text: text }); document.getElementById('msgInput').value = ''; }
        }
        document.getElementById('sendBtn').onclick = sendMsg;
        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fd = new FormData(); fd.append('chatFile', file);
            const res = await fetch('/api/upload', { method: 'POST', body: fd });
            const result = await res.json();
            if (result.fileUrl) socket.emit('message', { fileUrl: result.fileUrl, fileType: file.type.startsWith('image/') ? 'image' : 'audio' });
        };
    </script>
</body>
</html>
