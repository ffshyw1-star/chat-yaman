<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات اليمن المطور — غرفة الدردشة</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #090c15; --bg-card: #121826; --bg-input: #1a2238;
            --gold: #d4a857; --gold-dark: #b78a3c; --text: #f1f5f9;
            --border: rgba(255, 255, 255, 0.06); --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* الهيدر العلوي */
        .app-header { background: var(--bg-card); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); box-shadow: var(--shadow); }
        .app-header h1 { font-size: 18px; color: var(--gold); font-weight: 700; }
        .exit-btn { background: #e74c3c; color: #fff; padding: 6px 14px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600; }

        /* منطقة الرسائل الفاخرة */
        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; background: radial-gradient(circle at center, #141b2d 0%, var(--bg-dark) 100%); }
        
        /* فقاعات المحادثة */
        .msg-box { display: flex; flex-direction: column; max-width: 75%; padding: 12px 16px; border-radius: 16px; box-shadow: var(--shadow); animation: slideUp 0.25s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-box.me { align-self: flex-start; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #090c15; border-bottom-right-radius: 2px; }
        .msg-box.other { align-self: flex-end; background: var(--bg-card); color: var(--text); border-top-left-radius: 2px; border: 1px solid var(--border); }
        .msg-box.system { align-self: center; background: rgba(255,255,255,0.04); color: #94a3b8; font-size: 13px; padding: 6px 16px; border-radius: 20px; border: none; box-shadow: none; }
        
        .msg-user { font-size: 12px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .msg-box.other .msg-user { color: var(--gold); }
        .msg-text { font-size: 14px; line-height: 1.5; word-break: break-word; }
        .msg-time { font-size: 10px; align-self: flex-end; margin-top: 4px; opacity: 0.6; }

        /* منطقة الإدخال السفلية */
        .chat-footer { background: var(--bg-card); padding: 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--border); }
        .chat-footer input { flex: 1; background: var(--bg-input); border: 1px solid var(--border); padding: 14px 20px; border-radius: 30px; color: var(--text); outline: none; font-size: 14px; transition: 0.2s; }
        .chat-footer input:focus { border-color: var(--gold); }
        .chat-footer button { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #090c15; border: none; padding: 12px 26px; border-radius: 30px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .chat-footer button:hover { transform: scale(1.03); filter: brightness(1.1); }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div class="app-header">
        <h1 id="roomTitle">👑 شات اليمن المطور</h1>
        <a href="/rooms.html" class="exit-btn">مغادرة الغرفة 🚪</a>
    </div>

    <div class="chat-area" id="chatBox"></div>

    <form class="chat-footer" id="chatForm">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك الاحترافية هنا..." autocomplete="off" required>
        <button type="submit">إرسال 🚀</button>
    </form>

    <script>
        const socket = io();
        const chatBox = document.getElementById('chatBox');
        const myName = localStorage.getItem("chat_username") || localStorage.getItem("guestName") || "مستخدم جديد";
        const myGender = localStorage.getItem("gender") || "male";
        const myRoom = localStorage.getItem("current_room") || "العامة";

        document.getElementById('roomTitle').innerText = `👑 غرفة: ${myRoom}`;
        socket.emit('join', { name: myName, room: myRoom, gender: myGender });

        socket.on('msg', (data) => {
            const div = document.createElement('div');
            if (data.isSystem) {
                div.className = "msg-box system";
                div.innerHTML = `<span class="msg-text">${data.text}</span>`;
            } else {
                const isMe = data.user === myName;
                div.className = `msg-box ${isMe ? 'me' : 'other'}`;
                const icon = data.gender === 'female' ? '👩' : '👨';
                div.innerHTML = `
                    ${isMe ? '' : `<div class="msg-user"><span>${icon}</span>${data.user}</div>`}
                    <div class="msg-text">${data.text}</div>
                    <div class="msg-time">${data.time}</div>
                `;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        document.getElementById('chatForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            socket.emit('message', { text: input.value.trim() });
            input.value = '';
        });
    </script>
</body>
</html>
