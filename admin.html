<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>لوحة تحكم المالك — شات اليمن المطور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0f1117;--bg-1:#161a26;--bg-2:#1d2333;--bg-3:#252b3d;
  --primary:#d4a857;--primary-2:#b78a3c;--accent:#c0392b;
  --success:#2ecc71;--danger:#e74c3c;--info:#3498db;--warn:#f39c12;
  --text:#ecf0f5;--text-muted:#9aa3b2;--text-dim:#6b7388;
  --border:rgba(255,255,255,.08);
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --radius:14px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Cairo','Tajawal',Tahoma,sans-serif;
  background:var(--bg-0);color:var(--text);
  line-height:1.6;direction:rtl;
  background-image:
    radial-gradient(circle at 20% 0%,rgba(212,168,87,.08),transparent 40%),
    radial-gradient(circle at 80% 100%,rgba(192,57,43,.06),transparent 40%);
  background-attachment:fixed;
}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;outline:none}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg-1)}
::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--primary)}

/* ===== Auth Gate ===== */
.auth-gate{
  position:fixed;inset:0;z-index:1000;
  background:linear-gradient(135deg,#0a0d15,#1a1420);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.auth-gate.hide{display:none}
.auth-card{
  background:var(--bg-1);border:1px solid var(--primary);
  border-radius:var(--radius);padding:40px 30px;
  width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(212,168,87,.2);
}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .crown{font-size:48px;display:block;filter:drop-shadow(0 4px 12px rgba(212,168,87,.5))}
.auth-logo h1{
  font-size:24px;color:var(--primary);
  margin:8px 0 4px;
}
.auth-logo p{font-size:13px;color:var(--text-muted)}
.auth-captcha{
  background:var(--bg-2);border:1px dashed var(--primary-2);
  padding:10px;border-radius:8px;font-family:monospace;
  text-align:center;letter-spacing:6px;font-size:18px;
  color:var(--primary);margin-bottom:14px;
  user-select:none;
}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.app.hidden{display:none}

/* ===== Sidebar ===== */
.sidebar-admin{
  width:260px;background:var(--bg-1);
  border-left:1px solid var(--border);
  flex-shrink:0;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;
  transition:transform .3s;
}
.sb-head{
  padding:18px 16px;border-bottom:1px solid var(--border);
}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-logo-c{
  width:46px;height:46px;border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
}
.sb-logo h2{font-size:15px;color:var(--primary)}
.sb-logo p{font-size:11px;color:var(--text-muted)}
.sb-credit{
  margin-top:14px;background:var(--bg-2);
  padding:12px;border-radius:10px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;
}
.sb-credit strong{color:var(--primary);font-size:14px}
.sb-nav{flex:1;padding:14px 8px;overflow-y:auto}
.sb-section{font-size:10px;color:var(--text-dim);padding:10px 12px 6px;text-transform:uppercase;letter-spacing:1px}
.sb-link{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  font-size:14px;color:var(--text-muted);
  cursor:pointer;transition:.2s;margin-bottom:2px;
  position:relative;
}
.sb-link:hover{background:var(--bg-2);color:var(--text)}
.sb-link.active{background:linear-gradient(135deg,rgba(212,168,87,.18),rgba(192,57,43,.1));color:var(--primary)}
.sb-link.active::before{
  content:'';position:absolute;right:0;top:8px;bottom:8px;
  width:3px;background:var(--primary);border-radius:3px;
}
.sb-link .ic{font-size:18px;width:24px;text-align:center}
.sb-link .badge{
  margin-right:auto;background:var(--accent);
  color:#fff;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;
}
.sb-foot{
  padding:14px;border-top:1px solid var(--border);
}
.sb-foot .user-info{
  display:flex;align-items:center;gap:10px;
  padding:8px;border-radius:10px;background:var(--bg-2);
}
.sb-foot .av{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;font-weight:700;
}
.sb-foot .nm{font-weight:700;color:var(--primary);font-size:13px}
.sb-foot .rl{font-size:11px;color:var(--text-muted)}

/* ===== Main ===== */
.main{flex:1;min-width:0;display:flex;flex-direction:column}

/* Top */
.topbar{
  background:rgba(22,26,38,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 22px;display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:20;
}
.topbar .menu-btn{display:none;font-size:22px;padding:6px 10px;border-radius:8px;background:var(--bg-2)}
.topbar h1{font-size:20px;color:var(--primary);font-weight:800}
.topbar .breadcrumb{font-size:12px;color:var(--text-muted);margin-top:2px}
.topbar .search{
  margin-right:auto;background:var(--bg-2);
  border:1px solid var(--border);border-radius:24px;
  padding:8px 16px;display:flex;align-items:center;gap:8px;
  min-width:200px;color:var(--text);
}
.topbar .search input{background:transparent;border:none;color:var(--text);width:100%;font-size:13px}
.topbar .bell{
  position:relative;width:38px;height:38px;
  background:var(--bg-2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;transition:.2s;
}
.topbar .bell:hover{background:var(--bg-3);color:var(--primary)}
.topbar .bell .dot{
  position:absolute;top:6px;left:6px;
  width:8px;height:8px;background:var(--accent);border-radius:50%;
  border:2px solid var(--bg-1);
}

/* Content */
.content{padding:24px;flex:1;overflow:auto}
.page{display:none}
.page.active{display:block;animation:fadePage .3s}
@keyframes fadePage{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Page head */
.page-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;flex-wrap:wrap;gap:14px;
}
.page-head h2{font-size:24px;font-weight:800;color:var(--text)}
.page-head p{color:var(--text-muted);font-size:13px;margin-top:4px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 16px;border-radius:10px;
  font-size:13px;font-weight:600;transition:.2s;
  background:var(--bg-2);border:1px solid var(--border);
}
.btn:hover{background:var(--bg-3);transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#0a0d15;border:none}
.btn-primary:hover{filter:brightness(1.1)}
.btn-danger{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;border:none}
.btn-success{background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff;border:none}
.btn-info{background:linear-gradient(135deg,#2980b9,#3498db);color:#fff;border:none}
.btn-warning{background:linear-gradient(135deg,#d68910,#f39c12);color:#fff;border:none}
.btn-ghost{background:transparent}
.btn-sm{padding:6px 10px;font-size:12px}
.btn-icon{padding:7px 9px;border-radius:8px}

/* ===== Stats Cards ===== */
.stats-grid{
  display:grid;gap:16px;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  margin-bottom:24px;
}
.stat-card{
  background:linear-gradient(135deg,var(--bg-1),var(--bg-2));
  border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;position:relative;overflow:hidden;
  transition:.3s;
}
.stat-card:hover{transform:translateY(-3px);border-color:var(--primary)}
.stat-card::after{
  content:'';position:absolute;
  top:-30px;left:-30px;width:90px;height:90px;
  background:radial-gradient(circle,rgba(212,168,87,.18),transparent 70%);
}
.stat-icon{
  width:50px;height:50px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin-bottom:12px;position:relative;z-index:1;
}
.stat-icon.gold{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#0a0d15}
.stat-icon.green{background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff}
.stat-icon.red{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff}
.stat-icon.blue{background:linear-gradient(135deg,#2980b9,#3498db);color:#fff}
.stat-icon.purple{background:linear-gradient(135deg,#8e44ad,#9b59b6);color:#fff}
.stat-value{font-size:28px;font-weight:900;color:var(--text);position:relative;z-index:1}
.stat-label{font-size:13px;color:var(--text-muted);margin-top:4px}
.stat-trend{font-size:11px;margin-top:8px;display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px}
.stat-trend.up{background:rgba(46,204,113,.15);color:var(--success)}
.stat-trend.down{background:rgba(231,76,60,.15);color:var(--danger)}

/* ===== Charts ===== */
.charts-row{
  display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px;
}
.chart-card{
  background:var(--bg-1);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.chart-head h3{font-size:16px;color:var(--text)}
.chart-head .period-tabs{display:flex;gap:4px;background:var(--bg-2);padding:4px;border-radius:8px}
.period-tab{padding:5px 12px;font-size:11px;border-radius:6px;cursor:pointer;color:var(--text-muted)}
.period-tab.active{background:var(--primary);color:#0a0d15;font-weight:700}

/* Bars chart (CSS) */
.bars-chart{height:220px;display:flex;align-items:flex-end;gap:8px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
.bar{width:100%;background:linear-gradient(180deg,var(--primary),var(--primary-2));border-radius:6px 6px 0 0;position:relative;min-height:4px;transition:.3s}
.bar:hover{filter:brightness(1.15)}
.bar-label{font-size:10px;color:var(--text-dim)}
.bar-value{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--primary)}

/* Donut chart */
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.donut{
  width:160px;height:160px;border-radius:50%;
  background:conic-gradient(
    var(--primary) 0 35%,
    var(--accent) 35% 60%,
    var(--info) 60% 80%,
    var(--success) 80% 92%,
    var(--text-dim) 92% 100%
  );
  position:relative;display:flex;align-items:center;justify-content:center;
}
.donut::before{
  content:'';position:absolute;inset:18px;
  background:var(--bg-1);border-radius:50%;
}
.donut-val{
  position:relative;z-index:2;text-align:center;
}
.donut-val .big{font-size:24px;font-weight:900;color:var(--text)}
.donut-val .small{font-size:11px;color:var(--text-muted)}
.legend{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;width:100%}
.legend-row{display:flex;align-items:center;gap:8px}
.legend-dot{width:10px;height:10px;border-radius:50%}
.legend-row .nm{flex:1;color:var(--text-muted)}
.legend-row .vl{font-weight:700;color:var(--text)}

/* ===== Table ===== */
.table-wrap{
  background:var(--bg-1);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.table-toolbar{
  padding:14px;display:flex;gap:10px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);background:var(--bg-2);
}
.table-toolbar .search{
  flex:1;min-width:200px;background:var(--bg-0);
  border:1px solid var(--border);border-radius:8px;
  padding:8px 14px;display:flex;align-items:center;gap:8px;
}
.table-toolbar .search input{background:transparent;border:none;color:var(--text);width:100%}
.table-toolbar select{
  background:var(--bg-0);border:1px solid var(--border);
  color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;
}
table{width:100%;border-collapse:collapse}
th,td{padding:14px 16px;text-align:right;font-size:13px}
th{background:var(--bg-2);color:var(--text-muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:.2s}
tbody tr:hover{background:rgba(212,168,87,.04)}
tbody tr:last-child{border-bottom:none}
.tbl-check{width:18px;height:18px;accent-color:var(--primary)}
.cell-user{display:flex;align-items:center;gap:10px}
.cell-user .av{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
}
.cell-user .nm{font-weight:600}
.cell-user .sub{font-size:11px;color:var(--text-muted)}

/* Badges */
.bdg{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
}
.bdg.gold{background:var(--primary);color:#0a0d15}
.bdg.red{background:var(--accent);color:#fff}
.bdg.green{background:var(--success);color:#fff}
.bdg.blue{background:var(--info);color:#fff}
.bdg.orange{background:var(--warn);color:#fff}
.bdg.purple{background:#9b59b6;color:#fff}
.bdg.gray{background:var(--bg-3);color:var(--text-muted)}
.bdg.dot::before{content:'';width:6px;height:6px;background:currentColor;border-radius:50%}

/* Action buttons */
.row-actions{display:flex;gap:4px}
.icon-act{
  width:30px;height:30px;border-radius:8px;
  background:var(--bg-2);display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:.2s;
}
.icon-act:hover{background:var(--bg-3);color:var(--primary)}
.icon-act.danger:hover{color:var(--danger)}
.icon-act.success:hover{color:var(--success)}
.icon-act.warn:hover{color:var(--warn)}

/* ===== Pagination ===== */
.pagination{
  padding:14px;display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--border);background:var(--bg-2);
  font-size:13px;color:var(--text-muted);
}
.pagination .pages{display:flex;gap:4px}
.pg-btn{
  width:32px;height:32px;border-radius:8px;
  background:var(--bg-3);color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;transition:.15s;
}
.pg-btn:hover{background:var(--primary);color:#0a0d15}
.pg-btn.active{background:var(--primary);color:#0a0d15;font-weight:700}

/* ===== Cards / Rooms ===== */
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.room-admin-card{
  background:var(--bg-1);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;
  display:flex;gap:14px;transition:.3s;position:relative;
}
.room-admin-card:hover{border-color:var(--primary);transform:translateY(-3px)}
.room-admin-card .flag{font-size:34px;flex-shrink:0}
.room-admin-card .info2{flex:1}
.room-admin-card h3{font-size:15px;color:var(--text);margin-bottom:4px}
.room-admin-card .meta{font-size:12px;color:var(--text-muted);margin-bottom:6px}
.room-admin-card .meta strong{color:var(--success)}
.room-admin-card .actions{display:flex;gap:4px;margin-top:10px}

/* ===== Moderation ===== */
.mod-card{
  background:var(--bg-1);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;
  border-right:4px solid var(--accent);margin-bottom:12px;
}
.mod-card.info{border-right-color:var(--info)}
.mod-card.warn{border-right-color:var(--warn)}
.mod-card.ok{border-right-color:var(--success)}
.mod-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:10px}
.mod-head .left{display:flex;align-items:center;gap:10px}
.mod-head .av{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;font-weight:700;
}
.mod-head .nm{font-weight:700}
.mod-head .info{font-size:11px;color:var(--text-muted)}
.mod-head .right{display:flex;gap:6px}
.mod-rel{font-size:13px;color:var(--text);background:var(--bg-2);padding:10px 12px;border-radius:8px;margin-bottom:8px;border:1px solid var(--border)}
.mod-quote{font-size:13px;color:var(--text-muted);background:var(--bg-0);padding:10px 12px;border-radius:8px;margin-bottom:10px;border-right:3px solid var(--accent);font-style:italic}
.mod-actions{display:flex;gap:6px;flex-wrap:wrap}

/* ===== News ===== */
.news-form{
  background:var(--bg-1);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;margin-bottom:18px;
}
.news-form .field{margin-bottom:14px}
.news-form label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px}
.news-form input,.news-form textarea,.news-form select{
  width:100%;background:var(--bg-2);border:1px solid var(--border);
  padding:10px 12px;border-radius:8px;color:var(--text);font-size:14px;
  font-family:inherit;
}
.news-form textarea{min-height:100px;resize:vertical}

.news-list{display:flex;flex-direction:column;gap:12px}
.news-row{
  background:var(--bg-1);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  display:flex;gap:14px;align-items:flex-start;
}
.news-row .av-sm{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;font-weight:700;
}
.news-row .body{flex:1}
.news-row h4{font-size:15px;color:var(--text);margin-bottom:6px}
.news-row p{font-size:13px;color:var(--text-muted);line-height:1.7}
.news-row .meta{font-size:11px;color:var(--text-dim);margin-top:8px;display:flex;gap:14px;flex-wrap:wrap}

/* ===== Settings ===== */
.settings-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;
}
.set-card{
  background:var(--bg-1);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
}
.set-card h3{font-size:16px;color:var(--primary);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.set-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.set-row:last-child{border-bottom:none}
.set-row .label-main{font-size:14px;color:var(--text);font-weight:600}
.set-row .label-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
/* Toggle */
.toggle{position:relative;width:46px;height:24px;background:var(--bg-3);border-radius:24px;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle::after{
  content:'';position:absolute;top:3px;right:3px;
  width:18px;height:18px;background:var(--text-muted);
  border-radius:50%;transition:.2s;
}
.toggle.on{background:var(--success)}
.toggle.on::after{right:25px;background:#fff}

/* Logs */
.log-row{
  display:grid;grid-template-columns:120px 1fr auto;
  gap:14px;padding:12px 16px;
  border-bottom:1px solid var(--border);font-size:13px;
  transition:.15s;
}
.log-row:hover{background:var(--bg-2)}
.log-row .lvl{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;text-align:center}
.log-row .lvl.info{background:var(--info);color:#fff}
.log-row .lvl.warn{background:var(--warn);color:#fff}
.log-row .lvl.error{background:var(--danger);color:#fff}
.log-row .lvl.ok{background:var(--success);color:#fff}
.log-row .msg{color:var(--text)}
.log-row .msg .who{font-weight:700;color:var(--primary)}
.log-row .ts{color:var(--text-dim);font-size:11px;white-space:nowrap}

/* ===== Tabs ===== */
.tabs{
  display:flex;gap:0;background:var(--bg-2);
  padding:4px;border-radius:10px;margin-bottom:18px;
  overflow-x:auto;
}
.tab{
  padding:9px 16px;font-size:13px;color:var(--text-muted);
  border-radius:8px;cursor:pointer;transition:.2s;white-space:nowrap;
  font-weight:600;
}
