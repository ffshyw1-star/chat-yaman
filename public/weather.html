<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الطقس 🌤️</title>
<style>
:root {
  --primary: #087E8B;
  --secondary: #0B5563;
  --accent: #FF6B35;
  --light: #F7F7F7;
  --dark: #2C3E50;
  --success: #27AE60;
  --warning: #F39C12;
  --danger: #E74C3C;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
}

.header {
  text-align: center;
  color: white;
  margin-bottom: 30px;
  animation: fadeInDown 0.8s ease-out;
}

.header h1 {
  font-size: 2.5em;
  margin-bottom: 10px;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
}

.header p {
  font-size: 1.1em;
  opacity: 0.9;
}

@keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.search-section {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
  justify-content: center;
  flex-wrap: wrap;
}

.search-box {
  display: flex;
  gap: 10px;
  flex: 1;
  max-width: 500px;
}

.search-box input {
  flex: 1;
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  font-size: 1em;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  outline: none;
  transition: 0.3s;
}

.search-box input:focus {
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
}

.search-box button {
  padding: 12px 30px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
}

.search-box button:hover {
  background: #ff5722;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
}

.current-weather {
  background: white;
  border-radius: 20px;
  padding: 40px;
  margin-bottom: 30px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
  animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.weather-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  flex-wrap: wrap;
  gap: 20px;
}

.city-info h2 {
  font-size: 2.2em;
  color: var(--dark);
  margin-bottom: 5px;
}

.city-info p {
  color: #7f8c8d;
  font-size: 1em;
}

.temp-display {
  display: flex;
  align-items: center;
  gap: 20px;
}

.weather-icon {
  font-size: 4em;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

.temperature {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.temp-value {
  font-size: 3.5em;
  font-weight: bold;
  color: var(--primary);
}

.temp-desc {
  font-size: 1.1em;
  color: #7f8c8d;
  text-transform: capitalize;
}

.weather-details {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.detail-card {
  background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  border-left: 4px solid var(--primary);
  transition: 0.3s;
}

.detail-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
}

.detail-value {
  font-size: 1.8em;
  font-weight: bold;
  color: var(--primary);
  margin: 10px 0;
}

.detail-label {
  color: #7f8c8d;
  font-size: 0.9em;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.hourly-forecast {
  background: white;
  border-radius: 20px;
  padding: 30px;
  margin-bottom: 30px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
  animation: slideUp 0.6s ease-out 0.1s backwards;
}

.hourly-forecast h3 {
  color: var(--dark);
  margin-bottom: 20px;
  font-size: 1.5em;
}

.hourly-scroll {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  padding: 15px 0;
  scroll-behavior: smooth;
}

.hourly-item {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 20px;
  border-radius: 15px;
  min-width: 120px;
  text-align: center;
  flex-shrink: 0;
  transition: 0.3s;
}

.hourly-item:hover {
  transform: translateY(-5px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}

.hourly-time {
  font-weight: bold;
  margin-bottom: 10px;
}

.hourly-icon {
  font-size: 2em;
  margin: 10px 0;
}

.hourly-temp {
  font-size: 1.2em;
  font-weight: bold;
}

.daily-forecast {
  background: white;
  border-radius: 20px;
  padding: 30px;
  margin-bottom: 30px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
  animation: slideUp 0.6s ease-out 0.2s backwards;
}

.daily-forecast h3 {
  color: var(--dark);
  margin-bottom: 20px;
  font-size: 1.5em;
}

.daily-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
}

.daily-item {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
}

.daily-item:hover {
  transform: translateY(-5px);
  box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
}

.daily-day {
  font-weight: bold;
  margin-bottom: 10px;
  text-transform: capitalize;
}

.daily-icon {
  font-size: 2.5em;
  margin: 10px 0;
}

.daily-temps {
  font-size: 0.95em;
}

.daily-high {
  font-weight: bold;
}

.daily-low {
  opacity: 0.8;
}

.alerts {
  background: #fff3cd;
  color: #856404;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  border-left: 4px solid var(--warning);
  display: none;
}

.alerts.show {
  display: block;
}

.error-message {
  background: #f8d7da;
  color: #721c24;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  border-left: 4px solid var(--danger);
  display: none;
  animation: slideUp 0.3s ease-out;
}

.error-message.show {
  display: block;
}

.loading {
  text-align: center;
  padding: 40px;
  color: white;
}

.spinner {
  border: 4px solid rgba(255, 255, 255, 0.3);
  border-top: 4px solid white;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.weather-map {
  background: white;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
  animation: slideUp 0.6s ease-out 0.3s backwards;
}

.weather-map h3 {
  color: var(--dark);
  margin-bottom: 20px;
  font-size: 1.5em;
}

#weatherMap {
  width: 100%;
  height: 400px;
  border-radius: 15px;
  background: #f0f0f0;
}

.refresh-button {
  background: var(--success);
  color: white;
  border: none;
  padding: 12px 30px;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
}

.refresh-button:hover {
  background: #229954;
  transform: translateY(-2px);
}

.refresh-button.loading {
  opacity: 0.7;
  cursor: not-allowed;
}

@media (max-width: 768px) {
  .header h1 {
    font-size: 2em;
  }

  .weather-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .temp-display {
    width: 100%;
  }

  .weather-details {
    grid-template-columns: repeat(2, 1fr);
  }

  .current-weather {
    padding: 20px;
  }

  .search-box {
    flex-direction: column;
    max-width: 100%;
  }
}
</style>
</head>
<body>

<div class="container">
  <!-- العنوان -->
  <div class="header">
    <h1>🌤️ لوحة الطقس</h1>
    <p>احصل على معلومات الطقس الحالية والتنبؤات المستقبلية</p>
  </div>

  <!-- البحث -->
  <div class="search-section">
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="أدخل اسم المدينة..." onkeypress="handleSearchKey(event)">
      <button onclick="searchCity()">🔍 بحث</button>
      <button class="refresh-button" onclick="getCurrentLocation()">📍 الموقع الحالي</button>
    </div>
  </div>

  <!-- رسائل الخطأ -->
  <div class="error-message" id="errorMessage"></div>

  <!-- التنبيهات -->
  <div class="alerts" id="alerts"></div>

  <!-- الطقس الحالي -->
  <div class="current-weather" id="currentWeather">
    <div class="loading">
      <div class="spinner"></div>
      <p>جاري تحميل بيانات الطقس...</p>
    </div>
  </div>

  <!-- التنبؤ بالساعات -->
  <div class="hourly-forecast" id="hourlyForecast" style="display: none;">
    <h3>⏰ التنبؤ بالساعات القادمة</h3>
    <div class="hourly-scroll" id="hourlyScroll"></div>
  </div>

  <!-- التنبؤ اليومي -->
  <div class="daily-forecast" id="dailyForecast" style="display: none;">
    <h3>📅 التنبؤ ليومين القادمين</h3>
    <div class="daily-grid" id="dailyGrid"></div>
  </div>

  <!-- خريطة الطقس -->
  <div class="weather-map" id="weatherMap" style="display: none;">
    <h3>🗺️ خريطة الطقس</h3>
    <div id="mapContainer" style="width: 100%; height: 400px; border-radius: 15px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #999;">
      جاري تحميل الخريطة...
    </div>
  </div>
</div>

<!-- مكتبات خارجية -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

<!-- أيقونات الطقس -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/11.3.0/weather-icons.min.css">

<script src="/js/weather.js"></script>
</body>
</html>
