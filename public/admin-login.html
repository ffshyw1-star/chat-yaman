<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول الإدارة - شات اليمن المطور</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Tahoma', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #075e54;
      --secondary: #2196F3;
      --danger: #E91E63;
      --success: #4CAF50;
      --warning: #FF9800;
      --gray: #9E9E9E;
      --light: #f5f5f5;
    }

    body {
      background: linear-gradient(135deg, var(--primary), #128c7e);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      font-size: 28px;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .login-header p {
      color: var(--gray);
      font-size: 14px;
    }

    .login-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--primary);
      font-weight: bold;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid var(--light);
      border-radius: 8px;
      font-size: 14px;
      transition: 0.3s;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(7, 94, 84, 0.2);
    }

    .remember-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .remember-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      margin: 0;
      color: var(--gray);
    }

    .remember-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .forgot-link {
      color: var(--secondary);
      text-decoration: none;
      transition: 0.3s;
    }

    .forgot-link:hover {
      color: var(--primary);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), #128c7e);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 15px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(7, 94, 84, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .back-btn {
      width: 100%;
      padding: 12px;
      background: var(--light);
      color: var(--primary);
      border: 2px solid var(--light);
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: white;
      border-color: var(--primary);
    }

    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-right: 4px solid #c62828;
      display: none;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .success-message {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-right: 4px solid #2e7d32;
      display: none;
    }

    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }

    .spinner {
      border: 4px solid var(--light);
      border-top-color: var(--primary);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .demo-credentials {
      background: #fff3e0;
      border: 1px solid #ffe0b2;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 13px;
      color: #e65100;
    }

    .demo-credentials h4 {
      margin-bottom: 8px;
      font-size: 14px;
    }

    .demo-credentials p {
      margin: 5px 0;
    }

    .demo-credentials code {
      background: rgba(0, 0, 0, 0.05);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }

      .login-header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-icon">🔐</div>
      <h1>لوحة التحكم</h1>
      <p>مرحباً بعودتك أيها المسؤول</p>
    </div>

    <div class="error-message" id="errorMsg"></div>
    <div class="success-message" id="successMsg"></div>
    <div class="loading" id="loading"><div class="spinner"></div></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>👤 اسم المستخدم أو البريد</label>
        <input type="text" id="username" placeholder="أدخل اسمك" required>
      </div>

      <div class="form-group">
        <label>🔑 كلمة المرور</label>
        <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
      </div>

      <div class="remember-group">
        <label>
          <input type="checkbox" id="remember">
          تذكرني
        </label>
        <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
      </div>

      <button type="submit" class="login-btn">🚀 دخول</button>
      <button type="button" class="back-btn" onclick="goToHome()">← العودة للرئيسية</button>
    </form>

    <div class="demo-credentials">
      <h4>🧪 بيانات تجريبية:</h4>
      <p><strong>المستخدم:</strong> <code>admin</code></p>
      <p><strong>كلمة المرور:</strong> <code>admin123</code></p>
      <p><em>للاختبار فقط - يجب تغييرها في الإنتاج</em></p>
    </div>
  </div>

  <script>
    // التحقق من تسجيل الدخول السابق
    if (localStorage.getItem('adminToken')) {
      window.location.href = '/admin.html';
    }

    async function handleLogin(event) {
      event.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const loading = document.getElementById('loading');

      // إظهار رسالة التحميل
      loading.style.display = 'block';
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'فشل تسجيل الدخول');
        }

        // التحقق من أن المستخدم لديه صلاحيات إدارة
        if (data.user.role !== 'أدمن' && data.user.role !== 'مالك' && data.user.role !== 'إدارة') {
          throw new Error('ليس لديك صلاحيات الوصول إلى لوحة التحكم');
        }

        // حفظ البيانات
        localStorage.setItem('adminToken', data.token);
        localStorage.setItem('currentUser', JSON.stringify(data.user));

        if (remember) {
          localStorage.setItem('rememberMe', 'true');
        }

        // رسالة النجاح
        successMsg.textContent = '✅ تم تسجيل الدخول بنجاح';
        successMsg.style.display = 'block';

        // إعادة التوجيه
        setTimeout(() => {
          window.location.href = '/admin.html';
        }, 1000);
      } catch (error) {
        errorMsg.textContent = '❌ ' + error.message;
        errorMsg.style.display = 'block';
      } finally {
        loading.style.display = 'none';
      }
    }

    function goToHome() {
      window.location.href = '/';
    }

    // اختبار تسجيل دخول سريع
    function quickLogin(username, password) {
      document.getElementById('username').value = username;
      document.getElementById('password').value = password;
      document.querySelector('form').dispatchEvent(new Event('submit'));
    }
  </script>
</body>
</html>
