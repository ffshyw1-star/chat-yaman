<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولد النكات العشوائي 😂</title>
<style>
:root {
  --green: #075e54;
  --blue: #2196F3;
  --pink: #E91E63;
  --yellow: #FFC107;
  --purple: #9C27B0;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'tahoma', sans-serif;
}

body {
  background: linear-gradient(135deg, var(--green), var(--blue));
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  max-width: 600px;
  width: 100%;
}

.header {
  text-align: center;
  color: #fff;
  margin-bottom: 30px;
}

.header h1 {
  font-size: 2.5em;
  margin-bottom: 10px;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
  animation: bounce 2s infinite;
}

.header p {
  font-size: 1.1em;
  opacity: 0.9;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.card {
  background: white;
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  animation: slideUp 0.5s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.joke-container {
  margin-bottom: 30px;
  min-height: 150px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.joke-box {
  background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
  padding: 25px;
  border-radius: 15px;
  margin-bottom: 20px;
  border-left: 5px solid var(--blue);
  position: relative;
}

.joke-box::before {
  content: "😂";
  position: absolute;
  font-size: 2em;
  top: 10px;
  right: 15px;
  opacity: 0.3;
}

.joke-setup {
  font-size: 1.1em;
  color: #333;
  margin-bottom: 15px;
  font-weight: bold;
  line-height: 1.6;
}

.joke-punchline {
  font-size: 1.15em;
  color: var(--green);
  font-weight: bold;
  padding-top: 15px;
  border-top: 2px dashed var(--green);
  margin-top: 15px;
  animation: slideIn 0.5s ease-out 0.3s backwards;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.joke-type {
  display: inline-block;
  background: var(--yellow);
  color: #333;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.85em;
  font-weight: bold;
  margin-top: 10px;
}

.loading {
  text-align: center;
  color: var(--blue);
  font-size: 1em;
}

.spinner {
  border: 4px solid #f3f3f3;
  border-top: 4px solid var(--blue);
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin: 10px auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.buttons-group {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  justify-content: center;
}

button {
  flex: 1;
  min-width: 150px;
  padding: 15px 25px;
  border: none;
  border-radius: 12px;
  font-size: 1em;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.btn-primary {
  background: var(--green);
  color: white;
  box-shadow: 0 4px 15px rgba(7, 94, 84, 0.3);
}

.btn-primary:hover {
  background: #054a41;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(7, 94, 84, 0.4);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-secondary {
  background: var(--pink);
  color: white;
  box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);
}

.btn-secondary:hover {
  background: #c2185b;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(233, 30, 99, 0.4);
}

.btn-secondary:active {
  transform: translateY(0);
}

.stats {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
  text-align: center;
}

.stats-item {
  display: inline-block;
  margin: 0 15px;
}

.stats-number {
  font-size: 1.8em;
  font-weight: bold;
  color: var(--yellow);
}

.stats-label {
  font-size: 0.9em;
  opacity: 0.9;
}

.joke-filters {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
  flex-wrap: wrap;
  justify-content: center;
}

.filter-btn {
  padding: 8px 16px;
  border: 2px solid #ddd;
  background: white;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s ease;
  color: #333;
}

.filter-btn:hover {
  border-color: var(--blue);
  color: var(--blue);
}

.filter-btn.active {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}

.error-message {
  background: #ffebee;
  color: #c62828;
  padding: 15px;
  border-radius: 10px;
  border-left: 4px solid #c62828;
  margin-bottom: 20px;
  animation: shake 0.5s ease-in-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.success-message {
  background: #e8f5e9;
  color: #2e7d32;
  padding: 15px;
  border-radius: 10px;
  border-left: 4px solid #2e7d32;
  margin-bottom: 20px;
  animation: slideUp 0.3s ease-out;
}

.copy-btn {
  background: var(--purple);
  color: white;
  padding: 8px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9em;
  margin-top: 10px;
  transition: 0.3s;
}

.copy-btn:hover {
  background: #6a1b9a;
}

.favorites-section {
  margin-top: 30px;
  padding-top: 20px;
  border-top: 2px solid #eee;
}

.favorites-section h3 {
  color: var(--green);
  margin-bottom: 15px;
  text-align: center;
}

.favorite-item {
  background: #f5f5f5;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border-left: 3px solid var(--pink);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.favorite-text {
  flex: 1;
  font-size: 0.95em;
  color: #333;
}

.remove-favorite {
  background: var(--pink);
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 0.8em;
}

.remove-favorite:hover {
  background: #c2185b;
}

@media (max-width: 600px) {
  .header h1 {
    font-size: 2em;
  }
  
  .card {
    padding: 25px;
  }
  
  .buttons-group {
    flex-direction: column;
  }
  
  button {
    width: 100%;
    min-width: auto;
  }
  
  .stats-item {
    display: block;
    margin: 10px 0;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>😂 مولد النكات العشوائي 😂</h1>
    <p>احصل على نكتة جديدة وضع ضحكتك!</p>
  </div>

  <div class="card">
    <!-- رسائل التنبيه -->
    <div id="messageContainer"></div>

    <!-- مرشحات النوع -->
    <div class="joke-filters">
      <button class="filter-btn active" onclick="setFilter('all')">الكل</button>
      <button class="filter-btn" onclick="setFilter('general')">عام</button>
      <button class="filter-btn" onclick="setFilter('programming')">برمجة</button>
      <button class="filter-btn" onclick="setFilter('knock-knock')">طرق الباب</button>
    </div>

    <!-- منطقة النكتة -->
    <div class="joke-container" id="jokeContainer">
      <div class="loading">
        <div class="spinner"></div>
        <p>جاري تحميل نكتة...</p>
      </div>
    </div>

    <!-- أزرار التحكم -->
    <div class="buttons-group">
      <button class="btn-primary" onclick="getRandomJoke()">
        🎲 نكتة جديدة
      </button>
      <button class="btn-secondary" onclick="toggleFavorite()">
        ❤️ إضافة للمفضلة
      </button>
    </div>

    <!-- الإحصائيات -->
    <div class="stats">
      <div class="stats-item">
        <div class="stats-number" id="jokeCount">0</div>
        <div class="stats-label">نكت تم جلبها</div>
      </div>
      <div class="stats-item">
        <div class="stats-number" id="favoriteCount">0</div>
        <div class="stats-label">نكت مفضلة</div>
      </div>
    </div>

    <!-- المفضلة -->
    <div class="favorites-section" id="favoritesSection" style="display: none;">
      <h3>❤️ النكات المفضلة</h3>
      <div id="favoritesList"></div>
    </div>
  </div>
</div>

<script src="/js/jokes.js"></script>
</body>
</html>
